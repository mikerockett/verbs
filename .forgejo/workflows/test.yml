name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sqlite:
    runs-on: php8.5
    name: SQLite
    steps:
      - name: Checkout code
        run: |
          apt-get update && apt-get install -y git unzip libsqlite3-dev
          git clone --depth 1 --branch "${FORGEJO_REF_NAME}" "${FORGEJO_SERVER_URL}/${FORGEJO_REPOSITORY}.git" .

      - name: Install dependencies
        run: |
          docker-php-ext-install pdo_sqlite
          curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest
        env:
          DB_CONNECTION: sqlite
